# StoryForge HTTP reverse proxy for ebbinghaus-gateway (port 80)
# Apply: bash scripts/apply-domain-nginx.sh

upstream storyforge_app {
    server storyforge:3000;
}

server {
    listen 80;
    server_name storyforge.fun www.storyforge.fun;

    client_max_body_size 32m;

    access_log /var/log/nginx/storyforge.access.log;
    error_log  /var/log/nginx/storyforge.error.log warn;

    location / {
        proxy_pass http://storyforge_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
